<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>Task Scheduler</h1>
        <span class="badge-count" id="badgeCount">0</span>
      </div>
      <div class="header-right">
        <button id="themeToggleBtn" class="icon-btn" title="Toggle Dark Mode">
          <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>
      </div>
    </header>



    <div class="tabs">
      <button class="tab active" data-tab="tasks">Tasks</button>
      <button class="tab" data-tab="timer">Timer</button>
      <button class="tab" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="calendar">Calendar</button>
    </div>

    <div id="tasksTab" class="tab-content active">
      <div class="search-bar">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input type="text" id="searchInput" placeholder="Search saved tasks...">
      </div>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <p class="shortcuts-hint">Press <kbd>N</kbd> new task - <kbd>/</kbd> search - <kbd>T</kbd> timer - <kbd>D</kbd>
        dashboard</p>

      <form id="taskForm">
        <input type="text" id="taskTitle" placeholder="Task title" required>
        <input type="text" id="taskDesc" placeholder="Description (optional)">
        <div class="row">
          <input type="date" id="taskDate" required>
          <input type="time" id="taskTime" required>
        </div>
        <input type="url" id="taskUrl" placeholder="URL to open (optional)">
        <div class="row">
          <select id="taskRepeat">
            <option value="none">No repeat</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
          </select>
          <select id="taskPriority">
            <option value="low">Low Priority</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High Priority</option>
          </select>
        </div>
        <div class="row">
          <input type="text" id="taskTags" placeholder="Tags (comma separated)">
          <select id="taskTagColor">
            <option value="#4F46E5">Indigo</option>
            <option value="#10B981">Green</option>
            <option value="#EF4444">Red</option>
            <option value="#F59E0B">Yellow</option>
            <option value="#3B82F6">Blue</option>
            <option value="#8B5CF6">Purple</option>
          </select>
        </div>
        <div id="subtasksContainer">
          <div class="subtask-input-row">
            <input type="text" id="subtaskInput" placeholder="Add subtask and press Enter">
            <button type="button" id="addSubtaskBtn" class="icon-btn">+</button>
          </div>
          <div id="subtaskPreviewList"></div>
        </div>
        <button type="submit" id="addTaskBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"></path>
            <path d="M12 5v14"></path>
          </svg>
          Add Task
        </button>
      </form>

      <div class="task-list" id="taskList"></div>

      <div class="export-import-row">
        <button id="exportBtn" class="secondary-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Export
        </button>
        <label class="secondary-btn" for="importFile">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          Import
        </label>
        <input type="file" id="importFile" accept=".json" style="display:none;">
      </div>

      <div class="empty-state" id="emptyState" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
        <p>No tasks yet</p>
        <span>Add your first task above</span>
      </div>
    </div>

    <div id="timerTab" class="tab-content">
      <div class="timer-container">
        <div class="timer-modes">
          <button class="timer-mode" data-minutes="25">Focus</button>
          <button class="timer-mode" data-minutes="180">3 Hours</button>
          <button class="timer-mode" data-minutes="5">Short Break</button>
          <button class="timer-mode" data-minutes="15">Long Break</button>
        </div>

        <div id="timerCustomRow" class="timer-custom-row">
          <span class="timer-custom-label">Custom</span>
          <input id="customMinutes" class="timer-custom-input" type="number" min="0" max="180" value="0" aria-label="Custom minutes">
          <span class="timer-custom-sep">:</span>
          <input id="customSeconds" class="timer-custom-input" type="number" min="0" max="59" value="0" aria-label="Custom seconds">
          <button id="setCustomTimerBtn" class="timer-custom-btn" type="button">Set</button>
        </div>
        <p id="timerCustomNote" class="timer-custom-note">Note: background notifications have a 30 second minimum.</p>

        <div class="timer-display">
          <svg class="progress-ring" width="200" height="200">
            <circle class="progress-ring__circle bg" stroke="var(--border-color)" stroke-width="8" fill="transparent"
              r="90" cx="100" cy="100" />
            <circle class="progress-ring__circle fg" stroke="var(--primary)" stroke-width="8" fill="transparent" r="90"
              cx="100" cy="100" id="timerProgress" />
          </svg>
          <div class="time-left" id="timeLeft">25:00</div>
        </div>

        <div class="timer-controls">
          <button id="startTimerBtn" class="timer-main-btn" title="Start Timer">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5.14v14c0 .86.84 1.4 1.58.97l11-7a1.12 1.12 0 0 0 0-1.94l-11-7a1.12 1.12 0 0 0-1.58.97z">
              </path>
            </svg>
          </button>
          <button id="pauseTimerBtn" class="timer-main-btn" style="display: none;" title="Pause Timer">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
            </svg>
          </button>
          <button id="resetTimerBtn" class="timer-secondary-btn" title="Reset Timer">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
              <path d="M3 3v5h5"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="session-history">
        <h3>Session History</h3>
        <div id="sessionList"></div>
      </div>
    </div>

    <div id="dashboardTab" class="tab-content">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon total">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="totalTasks">0</span>
            <span class="stat-label">Total Tasks</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon completed">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="completedTasks">0</span>
            <span class="stat-label">Completed</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon pending">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="pendingTasks">0</span>
            <span class="stat-label">Pending</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon today">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </div>
          <div class="stat-info">
            <span class="stat-value" id="todayTasks">0</span>
            <span class="stat-label">Due Today</span>
          </div>
        </div>
      </div>

      <div class="progress-section">
        <div class="progress-header">
          <span>Completion Rate</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="today-section">
        <h3>Today's Schedule</h3>
        <div class="today-list" id="todayList"></div>
      </div>
    </div>

    <div id="calendarTab" class="tab-content">
      <div class="calendar-header">
        <button id="prevMonth" title="Previous Month">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6" />
          </svg>
        </button>
        <span id="currentMonth"></span>
        <button id="nextMonth" title="Next Month">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6" />
          </svg>
        </button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

  <div class="snooze-menu" id="snoozeMenu">
    <button data-snooze="15">15 min</button>
    <button data-snooze="30">30 min</button>
    <button data-snooze="60">1 hour</button>
    <button data-snooze="tomorrow">Tomorrow</button>
    <button data-snooze="nextweek">Next Week</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>

</html>
